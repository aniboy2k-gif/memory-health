name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends shellcheck
          fi
          shellcheck --version

      - name: Run ShellCheck
        run: shellcheck install.sh scripts/*.sh
